name: Deploy to home.pl FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Wdrażanie plików
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Pobieranie kodu repozytorium
      uses: actions/checkout@v4

    # KROK 1: Instalacja Node.js (potrzebny do zbudowania Astro)
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Używamy stabilnej wersji LTS

    # KROK 2: Instalacja zależności i budowanie projektu
    - name: 🏗️ Instalacja i Budowanie Astro
      run: |
        cd astro
        npm install
        npm run build

    # KROK 3: Synchronizacja gotowych plików z folderu dist
    - name: 📂 Synchronizacja plików przez FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        
        # Wskazujemy nowy folder, w którym Astro generuje gotową stronę:
        local-dir: ./astro/dist/
        
        # Upewnij się, że /public_html/ to właściwy folder na Twoim serwerze FTP
        server-dir: /public_html/
        
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          **/README.md