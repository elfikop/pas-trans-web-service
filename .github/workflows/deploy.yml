name: Deploy to home.pl FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Wdrażanie plików
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Pobieranie kodu repozytorium
      uses: actions/checkout@v4

    # WYMAGANE: Astro 6 potrzebuje Node 22+
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # NAPRAWA: 'npm ci' i budowanie z poprawnymi uprawnieniami
    - name: 🏗️ Instalacja i Budowanie Astro
      run: |
        cd astro
        npm ci
        npm run build

    - name: 📂 Synchronizacja plików przez FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./astro/dist/
        server-dir: /public_html/
        # USUWA STARE PLIKI Z SERWERA:
        dangerous-clean-slate: true 
        # DODATKOWE PARAMETRY DLA HOME.PL:
        port: 21
        protocol: ftps
        security: loose